{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listaki — Mercado</title>
  <link rel="stylesheet" href="{% static 'styles/style.css' %}" />
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🛍️</div>
      <div>
        <div class="brand-name">Listaki</div>
        <div class="brand-tagline">Lista de Compras</div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Menu</div>
      <a href="/" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Painel
      </a>
      <a href="/mercado/" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        Mercado
        <span class="nav-badge" id="badge-mercado">0</span>
      </a>
      <a href="/online/" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
        </svg>
        Online
        <span class="nav-badge" id="badge-online">0</span>
      </a>
      <a href="/usuario/" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Usuário
      </a>
    </div>
    <div class="sidebar-footer">ListaViva © 2025</div>
  </aside>

  <!-- Main -->
  <main id="main">
    <div class="header-row">
      <div class="page-header">
        <div class="eyebrow">Lista de compras</div>
        <h1>Mercado</h1>
        <p id="page-subtitle">0 itens</p>
      </div>
      <button class="btn-primary" onclick="openModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Adicionar
      </button>
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="prog-label">0 de 0 itens concluídos</span>
        <span class="progress-pct" id="prog-pct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>

    <!-- List -->
    <div id="list"></div>
  </main>
</div>

<!-- Bottom nav (mobile) -->
<nav id="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="/" class="bottom-nav-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Painel
    </a>
    <a href="/mercado/" class="bottom-nav-btn active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      Mercado
    </a>
    <a href="/online/" class="bottom-nav-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
      </svg>
      Online
    </a>
    <a href="/usuario/" class="bottom-nav-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Usuário
    </a>
  </div>
</nav>

<!-- Modal: Adicionar ao Mercado -->
<div class="modal-overlay" id="modal-mercado">
  <div class="modal" id="modal-mercado-inner">
    <div class="modal-handle"></div>
    <h2>Adicionar ao Mercado</h2>
    <div class="form-grid">
      <div class="form-group form-full">
        <label>Nome do item</label>
        <input type="text" id="m-nome" placeholder="ex: Arroz integral" />
      </div>
      <div class="form-group">
        <label>Quantidade</label>
        <input type="number" id="m-qty" value="1" min="1" />
      </div>
      <div class="form-group">
        <label>Unidade</label>
        <select id="m-unit">
          <option value="un">un</option>
          <option value="kg">kg</option>
          <option value="g">g</option>
          <option value="L">L</option>
          <option value="ml">ml</option>
          <option value="pct">pct</option>
          <option value="cx">cx</option>
        </select>
      </div>
      <div class="form-group form-full">
        <label>Grupo</label>
        <select id="m-group">
          <option value="Geral">Geral</option>
          <option value="Frutas &amp; Verduras">Frutas &amp; Verduras</option>
          <option value="Laticínios">Laticínios</option>
          <option value="Carnes">Carnes</option>
          <option value="Padaria">Padaria</option>
          <option value="Bebidas">Bebidas</option>
          <option value="Limpeza">Limpeza</option>
          <option value="Higiene">Higiene</option>
          <option value="Congelados">Congelados</option>
          <option value="Mercearia">Mercearia</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary"   onclick="addItem()">Adicionar</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="{% static 'js/state.js' %}"></script>
<script src="{% static 'js/mercado.js' %}"></script>
</body>
</html>
