{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listaki — Compras Online</title>
  <link rel="stylesheet" href="{% static 'styles/style.css' %}" />
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🛍️</div>
      <div>
        <div class="brand-name">Listaki</div>
        <div class="brand-tagline">Lista de Compras</div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Menu</div>
      <a href="/" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Painel
      </a>
      <a href="/mercado/" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        Mercado
        <span class="nav-badge" id="badge-mercado">0</span>
      </a>
      <a href="/online/" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
        </svg>
        Online
        <span class="nav-badge" id="badge-online">0</span>
      </a>
      <a href="/usuario/" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Usuário
      </a>
    </div>
    <div class="sidebar-footer">ListaViva © 2025</div>
  </aside>

  <!-- Main -->
  <main id="main">
    <div class="header-row">
      <div class="page-header">
        <div class="eyebrow">Compras online</div>
        <h1>Online</h1>
        <p id="page-subtitle">0 itens — clique no card para abrir o link</p>
      </div>
      <button class="btn-primary" onclick="openModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Adicionar
      </button>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <button class="filter-chip active" onclick="setFilter(this,'todos')">Todos</button>
      <button class="filter-chip" onclick="setFilter(this,'alta')">Alta prioridade</button>
      <button class="filter-chip" onclick="setFilter(this,'media')">Média prioridade</button>
      <button class="filter-chip" onclick="setFilter(this,'baixa')">Baixa prioridade</button>
      <button class="filter-chip" onclick="setFilter(this,'pendentes')">Pendentes</button>
    </div>

    <!-- List -->
    <div id="list"></div>
  </main>
</div>

<!-- Bottom nav (mobile) -->
<nav id="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="/" class="bottom-nav-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Painel
    </a>
    <a href="/mercado/" class="bottom-nav-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      Mercado
    </a>
    <a href="/online/" class="bottom-nav-btn active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
      </svg>
      Online
    </a>
    <a href="/usuario/" class="bottom-nav-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Usuário
    </a>
  </div>
</nav>

<!-- Modal: Adicionar Compra Online -->
<div class="modal-overlay" id="modal-online">
  <div class="modal" id="modal-online-inner">
    <div class="modal-handle"></div>
    <h2>Adicionar Compra Online</h2>
    <div class="form-grid">
      <div class="form-group form-full">
        <label>Nome do produto</label>
        <input type="text" id="o-nome" placeholder="ex: Tênis Nike Air" />
      </div>
      <div class="form-group form-full">
        <label>Link do produto</label>
        <input type="url" id="o-link" placeholder="https://loja.com.br/produto" />
      </div>
      <div class="form-group">
        <label>Loja / Site</label>
        <input type="text" id="o-loja" placeholder="Amazon, Shopee…" />
      </div>
      <div class="form-group">
        <label>Preço estimado (R$)</label>
        <input type="number" id="o-preco" placeholder="0,00" step="0.01" min="0" />
      </div>
      <div class="form-group form-full">
        <label>Prioridade</label>
        <select id="o-prioridade">
          <option value="media">Média</option>
          <option value="alta">Alta</option>
          <option value="baixa">Baixa</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary"   onclick="addItem()">Adicionar</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="{% static 'js/state.js' %}"></script>
<script src="{% static 'js/online.js' %}"></script>
</body>
</html>
